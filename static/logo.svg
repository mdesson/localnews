<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
    <!-- Main paper -->
    <rect x="10" y="10" width="80" height="80" rx="4" fill="#00a676"/>

    <!-- Folded section on right -->
    <rect x="70" y="20" width="30" height="70" rx="0 4 4 0" fill="#1b6a8a"/>
    <rect x="70" y="20" width="4" height="70" fill="#15597a"/>

    <!-- Headline bar -->
    <rect x="20" y="22" width="42" height="6" rx="1" fill="white"/>

    <!-- Subhead -->
    <rect x="20" y="34" width="30" height="3" rx="1" fill="white" opacity="0.7"/>

    <!-- Text lines -->
    <rect x="20" y="44" width="42" height="2" rx="1" fill="white" opacity="0.5"/>
    <rect x="20" y="50" width="42" height="2" rx="1" fill="white" opacity="0.5"/>
    <rect x="20" y="56" width="35" height="2" rx="1" fill="white" opacity="0.5"/>

    <!-- Image placeholder -->
    <rect x="20" y="65" width="20" height="16" rx="2" fill="white" opacity="0.6"/>

    <!-- More text lines next to image -->
    <rect x="44" y="65" width="18" height="2" rx="1" fill="white" opacity="0.5"/>
    <rect x="44" y="71" width="18" height="2" rx="1" fill="white" opacity="0.5"/>
    <rect x="44" y="77" width="14" height="2" rx="1" fill="white" opacity="0.5"/>
</svg>